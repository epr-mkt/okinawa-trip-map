<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>🌺 오키나와 후발대 일정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent: #5511bc;
  --accent-bg: #f2ecfc;
  --accent-light: #f6efff;
  --bg: #f6f8fb;
  --surface: #ffffff;
  --border: #ececf2;
  --text: #1f2021;
  --muted: #757575;
  --sub: #525457;
  --r-lg: 14px;
  --font: 'Noto Sans KR', -apple-system, sans-serif;
  --day1: #5511bc; --day2: #0077b6; --day3: #e65100; --day4: #2e7d32;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; font-family: var(--font); overflow: hidden; }

/* ── 지도: 항상 전체 화면 고정 ── */
#map {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* ── 데스크탑: 왼쪽 패널 ── */
#panel {
  position: fixed;
  top: 0; left: 0;
  width: 360px;
  height: 100%;
  z-index: 100;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 18px rgba(28,32,36,0.10);
}

/* ── 모바일: 패널을 하단 슬라이드로 ── */
@media (max-width: 680px) {
  #panel {
    top: auto;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 52%;
    border-right: none;
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -4px 24px rgba(28,32,36,0.13);
    transition: transform 0.3s ease;
  }
  #panel.hidden {
    transform: translateY(100%);
  }
  #mob-toggle {
    display: flex !important;
  }
}

#panel-header {
  background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
  color: #fff; padding: 14px 18px 10px; flex-shrink: 0;
  border-radius: inherit;
}
#panel-header h1 { font-size: 0.92rem; font-weight: 800; }
#panel-header p  { font-size: 0.68rem; opacity: 0.82; margin-top: 2px; }

/* 드래그 핸들 (모바일) */
#drag-handle {
  display: none;
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.5);
  border-radius: 2px;
  margin: 0 auto 8px;
}
@media (max-width: 680px) {
  #drag-handle { display: block; }
}

/* DAY 탭 */
#day-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}
.day-tab {
  flex: 1; padding: 8px 2px; text-align: center;
  font-size: 0.65rem; font-weight: 700; color: var(--muted);
  cursor: pointer; border-bottom: 3px solid transparent;
  transition: all 0.18s; line-height: 1.4;
}
.day-tab:hover { background: var(--accent-light); color: var(--accent); }
.day-tab.active[data-day="all"] { color: var(--text); border-bottom-color: var(--text); background: var(--bg); }
.day-tab.active[data-day="1"]   { color: var(--day1); border-bottom-color: var(--day1); background: var(--accent-light); }
.day-tab.active[data-day="2"]   { color: var(--day2); border-bottom-color: var(--day2); background: #e8f4fd; }
.day-tab.active[data-day="3"]   { color: var(--day3); border-bottom-color: var(--day3); background: #fff3e0; }
.day-tab.active[data-day="4"]   { color: var(--day4); border-bottom-color: var(--day4); background: #e8f5e9; }

/* 장소 목록 */
#place-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#place-list::-webkit-scrollbar { width: 4px; }
#place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.day-group-hdr {
  padding: 6px 14px 4px;
  font-size: 0.62rem; font-weight: 800;
  letter-spacing: 0.6px; text-transform: uppercase;
  background: var(--bg); border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  color: var(--muted); display: flex; align-items: center; gap: 6px;
}
.day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.place-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 14px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.14s;
}
.place-item:hover  { background: var(--accent-light); }
.place-item.active { background: var(--accent-bg); }

.pin-num {
  width: 22px; height: 22px;
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.56rem; font-weight: 800; color: #fff;
  flex-shrink: 0; margin-top: 2px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.pin-num span { transform: rotate(45deg); display: block; }

.place-info { flex: 1; min-width: 0; }
.place-time { font-size: 0.6rem; color: var(--muted); font-weight: 600; margin-bottom: 1px; }
.place-name { font-size: 0.8rem; font-weight: 700; line-height: 1.3; color: var(--text); }
.place-cat  {
  font-size: 0.62rem; font-weight: 600; margin-top: 2px;
  padding: 1px 7px; border-radius: 9999px; display: inline-block;
}
.place-note { font-size: 0.62rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }

/* 범례 */
#legend {
  padding: 8px 14px; border-top: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
.legend-row { display: flex; flex-wrap: wrap; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.6rem; color: var(--muted); }

/* 지도 위 DAY 버튼 */
#day-btns {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 5px;
  z-index: 200;
}
@media (max-width: 680px) {
  #day-btns {
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
  }
}
@media (min-width: 681px) {
  #day-btns {
    left: calc(360px + 50% - 180px);
    transform: none;
  }
}
.day-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px; padding: 5px 12px;
  font-size: 0.68rem; font-weight: 700; color: var(--sub);
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  transition: all 0.18s; white-space: nowrap;
  font-family: var(--font);
}
.day-btn:hover { background: var(--accent-light); color: var(--accent); }
.day-btn.active { color: #fff; border-color: transparent; }

/* 모바일 토글 버튼 */
#mob-toggle {
  display: none;
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  background: var(--accent); color: #fff;
  border: none; border-radius: 24px;
  padding: 10px 22px;
  font-size: 0.8rem; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(85,17,188,0.4);
  font-family: var(--font);
  align-items: center; gap: 6px;
}

/* InfoWindow 커스텀 */
.iw-wrap { font-family: var(--font); min-width: 200px; max-width: 280px; }
.iw-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.iw-pin {
  width: 24px; height: 24px;
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.58rem; font-weight: 800; color: #fff; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.iw-pin span { transform: rotate(45deg); display: block; }
.iw-title { font-size: 0.88rem; font-weight: 800; color: #1f2021; }
.iw-time  { font-size: 0.66rem; color: #757575; font-weight: 600; margin-top: 1px; }
.iw-items { font-size: 0.73rem; color: #525457; line-height: 1.7; margin-bottom: 9px; }
.iw-items li { list-style: none; }
.iw-items li::before { content: "· "; color: #5511bc; font-weight: 700; }
.iw-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.iw-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 11px; border-radius: 6px;
  font-size: 0.7rem; font-weight: 700; text-decoration: none;
  font-family: var(--font); transition: opacity 0.15s;
}
.iw-btn:hover { opacity: 0.85; }
.iw-btn-primary { background: #5511bc; color: #fff; }
.iw-btn-sec { background: #f6f8fb; color: #525457; border: 1px solid #ddd; }
</style>
</head>
<body>

<!-- ── 구글맵 (항상 전체화면) ── -->
<div id="map"></div>

<!-- ── 지도 위 DAY 버튼 ── -->
<div id="day-btns">
  <button class="day-btn active" id="dbtn-all" style="background:var(--accent)" onclick="showDay('all',this)">전체</button>
  <button class="day-btn" id="dbtn-1" onclick="showDay(1,this)">DAY1·토</button>
  <button class="day-btn" id="dbtn-2" onclick="showDay(2,this)">DAY2·일</button>

  </div>
  <div id="place-list"></div>
  <div id="legend">
    <div class="legend-row">
      <div class="legend-item"><div class="day-dot" style="background:var(--day1)"></div>DAY1·토</div>

      <div class="legend-item"><div class="day-dot" style="background:var(--day4)"></div>DAY4·화</div>
    </div>
  </div>
</div>

<!-- ── 모바일 토글 버튼 ── -->
<button id="mob-toggle" onclick="togglePanel()">📋 일정 보기</button>

      { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
      { featureType: "transit", elementType: "labels", stylers: [{ visibility: "off" }] }
    ]
  });

  infoWindow = new google.maps.InfoWindow({ maxWidth: 300 });

  // 마커 & 경로선 생성
  DAYS_DATA.forEach(d => {
    const path = [];
    d.pins.forEach(pin => {
      const pos = { lat: pin.lat, lng: pin.lng };
      path.push(pos);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24s16-14 16-24C32 7.163 24.837 0 16 0z"
              fill="${d.color}" stroke="white" stroke-width="2"/>
        <text x="16" y="20" text-anchor="middle" dominant-baseline="middle"
              font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">${pin.id}</text>
      </svg>`;
      const marker = new google.maps.Marker({
        position: pos,
        map: map,
        icon: {
          url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(32, 40),
          anchor: new google.maps.Point(16, 40)
        },
        title: pin.name,
        zIndex: 100 + pin.id
      });
      marker.addListener('click', () => openInfoWindow(pin, d.color, marker));
      markers[pin.id] = { marker, pin, color: d.color };
    });
    const poly = new google.maps.Polyline({
      path,
      geodesic: true,
      strokeColor: d.color,
      strokeOpacity: 0.75,
      strokeWeight: 3,
      icons: [{
        icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 3, fillColor: d.color, fillOpacity: 1, strokeWeight: 0 },
        offset: '50%', repeat: '120px'
      }],
      map: map
    });
    polylines[d.day] = poly;
  });

  renderList('all');
  fitAllBounds();
}

// ── fitBounds ──
function fitAllBounds(dayNum) {
  const bounds = new google.maps.LatLngBounds();
  const src = dayNum ? DAYS_DATA.find(d => d.day === dayNum)?.pins : ALL_PINS;
  (src || ALL_PINS).forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
  map.fitBounds(bounds, { top: 60, right: 20, bottom: 20, left: window.innerWidth > 680 ? 380 : 20 });
}

// ── InfoWindow ──
function openInfoWindow(pin, color, marker) {
  const mq = `https://maps.google.com/?q=${encodeURIComponent(pin.q)}`;
  const nav = `https://maps.google.com/maps?daddr=${pin.lat},${pin.lng}`;
  const items = pin.items.map(i => `<li>${i}</li>`).join('');
  infoWindow.setContent(`
    <div class="iw-wrap">
      <div class="iw-header">
        <div class="iw-pin" style="background:${color}"><span>${pin.id}</span></div>
        <div><div class="iw-title">${pin.icon} ${pin.name}</div><div class="iw-time">${pin.time}</div></div>
      </div>
      <ul class="iw-items">${items}</ul>
      <div class="iw-btns">
        <a class="iw-btn iw-btn-primary" href="${mq}" target="_blank">📍 구글맵 열기</a>
        <a class="iw-btn iw-btn-sec" href="${nav}" target="_blank">🚗 길찾기</a>
      </div>
    </div>`);
  infoWindow.open(map, marker);
  map.panTo(marker.getPosition());
}

// ── 패널 목록 렌더링 ──
function renderList(dayFilter) {
  const list = document.getElementById('place-list');
  let html = '';
  DAYS_DATA.forEach(d => {
    if (dayFilter !== 'all' && d.day !== dayFilter) return;
    html += `<div class="day-group-hdr"><div class="day-dot" style="background:${d.color}"></div>${d.label}</div>`;
    d.pins.forEach((pin, i) => {
      const catColor = {
        '숙소':'#5511bc','식사':'#e65100','카페':'#0077b6','관광':'#2e7d32',
        '관광/식사':'#2e7d32','쇼핑':'#c2185b','이동':'#607d8b','네트워킹':'#795548'
      }[pin.cat] || '#757575';
      html += `<div class="place-item" id="li-${pin.id}" onclick="focusPin(${pin.id})">
        <div class="pin-num" style="background:${d.color}"><span>${pin.id}</span></div>
        <div class="place-info">
          <div class="place-time">${pin.icon} ${pin.time}</div>
          <div class="place-name">${pin.name}</div>
          <span class="place-cat" style="background:${catColor}22;color:${catColor}">${pin.cat}</span>
          <div class="place-note">${pin.note}</div>
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
}

// ── 핀 포커스 ──
function focusPin(id) {
  const m = markers[id];
  if (!m) return;
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById('li-' + id);
  if (li) li.classList.add('active');
  map.panTo(m.marker.getPosition());
  map.setZoom(14);
  openInfoWindow(m.pin, m.color, m.marker);
  // 모바일: 패널 숨기고 지도 보이게
  if (window.innerWidth <= 680 && !panelHidden) togglePanel();
}

// ── DAY 필터 (패널) ──
function filterDay(day, el) {
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentDay = day;
  renderList(day);
}

// ── DAY 표시 (지도) ──
function showDay(day, el) {
  document.querySelectorAll('.day-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
  });
  el.classList.add('active');
  const colors = { 1:'#5511bc', 2:'#0077b6', 3:'#e65100', 4:'#2e7d32' };
  el.style.background = day === 'all' ? 'var(--accent)' : (colors[day] || 'var(--accent)');

  DAYS_DATA.forEach(d => {
    const show = day === 'all' || d.day === day;
    d.pins.forEach(p => markers[p.id]?.marker.setVisible(show));
    if (polylines[d.day]) polylines[d.day].setVisible(show);
  });
  fitAllBounds(day === 'all' ? null : day);
}

// ── 모바일 패널 토글 ──
function togglePanel() {
  const panel = document.getElementById('panel');
  const btn = document.getElementById('mob-toggle');
  panelHidden = !panelHidden;
  if (panelHidden) {
    panel.classList.add('hidden');
    btn.textContent = '📋 일정 보기';
  } else {
    panel.classList.remove('hidden');
    btn.textContent = '🗺️ 지도 보기';
  }
}
</script>
