<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌺 오키나와 후발대 일정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent: #5511bc;
  --accent-bg: #f2ecfc;
  --accent-light: #f6efff;
  --bg: #f6f8fb;
  --surface: #ffffff;
  --border: #ececf2;
  --text: #1f2021;
  --muted: #757575;
  --sub: #525457;
  --shadow: 2px 4px 18px rgba(28,32,36,0.07);
  --shadow-h: 2px 4px 24px rgba(28,32,36,0.14);
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
  --font: 'Noto Sans KR', -apple-system, sans-serif;
  --day1: #5511bc; --day2: #0077b6; --day3: #e65100; --day4: #2e7d32;
  --panel: 360px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); overflow: hidden; }

/* ── 레이아웃 ── */
#app { display: flex; height: 100vh; }

/* ── 패널 ── */
#panel {
  width: var(--panel); min-width: var(--panel); height: 100%;
  display: flex; flex-direction: column;
  background: var(--surface); border-right: 1px solid var(--border);
  z-index: 100; box-shadow: var(--shadow);
}
#panel-header {
  background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
  color: #fff; padding: 16px 20px 12px; flex-shrink: 0;
}
#panel-header h1 { font-size: 0.95rem; font-weight: 800; letter-spacing: -0.3px; }
#panel-header p  { font-size: 0.7rem; opacity: 0.82; margin-top: 3px; }

/* DAY 탭 */
#day-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.day-tab {
  flex: 1; padding: 9px 4px; text-align: center;
  font-size: 0.67rem; font-weight: 700; color: var(--muted);
  cursor: pointer; border-bottom: 3px solid transparent;
  transition: all 0.18s; line-height: 1.4; font-family: var(--font);
}
.day-tab:hover { background: var(--accent-light); color: var(--accent); }
.day-tab.active[data-day="all"] { color: var(--text); border-bottom-color: var(--text); background: var(--bg); }
.day-tab.active[data-day="1"]   { color: var(--day1); border-bottom-color: var(--day1); background: var(--accent-light); }
.day-tab.active[data-day="2"]   { color: var(--day2); border-bottom-color: var(--day2); background: #e8f4fd; }
.day-tab.active[data-day="3"]   { color: var(--day3); border-bottom-color: var(--day3); background: #fff3e0; }
.day-tab.active[data-day="4"]   { color: var(--day4); border-bottom-color: var(--day4); background: #e8f5e9; }

/* 장소 목록 */
#place-list { flex: 1; overflow-y: auto; }
#place-list::-webkit-scrollbar { width: 4px; }
#place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.day-group-hdr {
  padding: 7px 16px 5px; font-size: 0.63rem; font-weight: 800;
  letter-spacing: 0.7px; text-transform: uppercase;
  background: var(--bg); border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  color: var(--muted); display: flex; align-items: center; gap: 6px;
}
.day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.place-item {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 9px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.14s; position: relative;
}
.place-item:hover  { background: var(--accent-light); }
.place-item.active { background: var(--accent-bg); }
.place-item::before {
  content: ''; position: absolute;
  left: 26px; top: 32px; bottom: -9px;
  width: 2px; background: var(--border); z-index: 0;
}
.place-item[data-last="true"]::before { display: none; }

.pin-num {
  width: 22px; height: 22px;
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.58rem; font-weight: 800; color: #fff;
  flex-shrink: 0; margin-top: 2px; position: relative; z-index: 1;
  box-shadow: 0 2px 7px rgba(0,0,0,0.22);
}
.pin-num span { transform: rotate(45deg); display: block; }

.place-info { flex: 1; min-width: 0; }
.place-time { font-size: 0.62rem; color: var(--muted); font-weight: 600; margin-bottom: 1px; }
.place-name { font-size: 0.82rem; font-weight: 700; line-height: 1.3; color: var(--text); }
.place-cat  {
  font-size: 0.65rem; font-weight: 600; margin-top: 2px;
  padding: 1px 7px; border-radius: 9999px; display: inline-block;
}
.place-note { font-size: 0.65rem; color: var(--muted); margin-top: 2px; line-height: 1.4; }

/* 범례 */
#legend {
  padding: 9px 16px; border-top: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
.legend-row { display: flex; flex-wrap: wrap; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.62rem; color: var(--muted); }

/* ── 지도 ── */
#map { flex: 1; height: 100%; }

/* 구글맵 InfoWindow 커스텀 */
.iw-wrap { font-family: var(--font); min-width: 220px; max-width: 300px; }
.iw-header { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.iw-pin {
  width: 26px; height: 26px;
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; font-weight: 800; color: #fff; flex-shrink: 0;
  box-shadow: 0 2px 7px rgba(0,0,0,0.22);
}
.iw-pin span { transform: rotate(45deg); display: block; }
.iw-title { font-size: 0.9rem; font-weight: 800; color: #1f2021; }
.iw-time  { font-size: 0.68rem; color: #757575; font-weight: 600; margin-top: 1px; }
.iw-items { font-size: 0.75rem; color: #525457; line-height: 1.7; margin-bottom: 10px; }
.iw-items li { list-style: none; }
.iw-items li::before { content: "· "; color: #5511bc; font-weight: 700; }
.iw-btns { display: flex; gap: 7px; flex-wrap: wrap; }
.iw-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; border-radius: 6px;
  font-size: 0.72rem; font-weight: 700; text-decoration: none;
  font-family: var(--font); transition: opacity 0.15s;
}
.iw-btn:hover { opacity: 0.85; }
.iw-btn-primary { background: #5511bc; color: #fff; }
.iw-btn-sec { background: #f6f8fb; color: #525457; border: 1px solid #ddd; }

/* 지도 위 DAY 버튼 */
#day-btns {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 10; pointer-events: all;
}
.day-btn {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 6px 14px;
  font-size: 0.72rem; font-weight: 700; color: var(--sub);
  cursor: pointer; box-shadow: var(--shadow);
  transition: all 0.18s; font-family: var(--font); white-space: nowrap;
}
.day-btn:hover { background: var(--accent-light); color: var(--accent); }
.day-btn.active { color: #fff; border-color: transparent; }

/* 모바일 */
#mob-toggle { display: none; }
@media (max-width: 680px) {
  :root { --panel: 100vw; }
  #panel { position: fixed; top: 0; left: 0; width: 100%; height: 55%; z-index: 200; transition: transform 0.3s; }
  #panel.hidden { transform: translateY(-100%); }
  #map { position: fixed; bottom: 0; left: 0; width: 100%; height: 50%; }
  #day-btns { top: auto; bottom: 70px; }
  #mob-toggle {
    display: flex; align-items: center; justify-content: center;
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 9999; background: var(--accent); color: #fff;
    border: none; border-radius: 24px; padding: 10px 24px;
    font-size: 0.82rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 16px rgba(85,17,188,0.35); font-family: var(--font);
  }
}
</style>
</head>
<body>
<div id="app">

      <h1>🌺 오키나와 후발대 일정</h1>

        <div class="legend-item"><div class="day-dot" style="background:var(--day4)"></div>DAY4·화</div>
      </div>
    </div>
  </div>

  <!-- ── 지도 ── -->
  <div style="flex:1;position:relative;">

</div>

  infoWindow = new google.maps.InfoWindow({ maxWidth: 320 });

  // 마커 & 경로선 생성
  DAYS_DATA.forEach(d => {
    const path = [];
    d.pins.forEach((pin, idx) => {
      const pos = { lat: pin.lat, lng: pin.lng };
      path.push(pos);

      // SVG 핀 마커
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
          <path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24s16-14 16-24C32 7.163 24.837 0 16 0z"
                fill="${d.color}" stroke="white" stroke-width="2"/>
          <text x="16" y="20" text-anchor="middle" dominant-baseline="middle"
                font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">${pin.id}</text>
        </svg>`;

      const marker = new google.maps.Marker({
        position: pos,
        map: map,
        icon: {
          url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(32, 40),
          anchor: new google.maps.Point(16, 40)
        },
        title: pin.name,
        zIndex: 100 + pin.id
      });

      marker.addListener('click', () => openInfoWindow(pin, d.color, marker));
      markers[pin.id] = { marker, pin, color: d.color };
    });

    // 경로선
    const poly = new google.maps.Polyline({
      path,
      geodesic: true,
      strokeColor: d.color,
      strokeOpacity: 0.75,
      strokeWeight: 3,
      icons: [{
        icon: { path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW, scale: 3, fillColor: d.color, fillOpacity: 1, strokeWeight: 0 },
        offset: '50%',
        repeat: '120px'
      }],
      map: map
    });
    polylines[d.day] = poly;
  });

  // 패널 렌더링
  renderList('all');
}

// ── InfoWindow 열기 ──
function openInfoWindow(pin, color, marker) {
  const itemsHtml = pin.items.map(i => `<li>${i}</li>`).join('');
  const content = `
    <div class="iw-wrap">
      <div class="iw-header">
        <div class="iw-pin" style="background:${color}"><span>${pin.id}</span></div>
        <div>
          <div class="iw-title">${pin.name}</div>
          <div class="iw-time">${pin.icon} ${pin.time}</div>
        </div>
      </div>
      <ul class="iw-items">${itemsHtml}</ul>
      <div style="font-size:0.68rem;color:#9ca3af;margin-bottom:10px">${pin.note}</div>
      <div class="iw-btns">
        <a class="iw-btn iw-btn-primary" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(pin.q||pin.name)}" target="_blank">📍 구글맵 열기</a>
        <a class="iw-btn iw-btn-sec" href="https://www.google.com/maps/dir/?api=1&destination=${pin.lat},${pin.lng}" target="_blank">🚗 길찾기</a>
      </div>
    </div>`;
  infoWindow.setContent(content);
  infoWindow.open(map, marker);
  map.panTo(marker.getPosition());

  // 패널 활성화
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.place-item[data-id="${pin.id}"]`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
}

// ── 패널 장소 클릭 ──
function clickPlace(pinId) {
  const m = markers[pinId];
  if (!m) return;
  map.panTo(m.marker.getPosition());
  map.setZoom(15);
  openInfoWindow(m.pin, m.color, m.marker);
}

// ── DAY 필터 (패널 탭) ──
function filterDay(day, tabEl) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  renderList(day);
  infoWindow.close();
}

// ── DAY 버튼 (지도 위) ──
function showDay(day, btnEl) {
  document.querySelectorAll('.day-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
  });
  btnEl.classList.add('active');

  if (day === 'all') {
    btnEl.style.background = '#5511bc';
    btnEl.style.color = '#fff';
    Object.values(markers).forEach(m => m.marker.setVisible(true));
    Object.values(polylines).forEach(p => p.setVisible(true));
    fitBounds('all');
  } else {
    const d = DAYS_DATA.find(x => x.day === day);
    btnEl.style.background = d.color;
    btnEl.style.color = '#fff';
    Object.values(markers).forEach(m => m.marker.setVisible(m.pin.dayNum === day));
    Object.values(polylines).forEach((p, k) => p.setVisible(Number(Object.keys(polylines)[k]) === day));
    // polylines 키 기반으로 처리
    Object.entries(polylines).forEach(([k, p]) => p.setVisible(Number(k) === day));
    fitBounds(day);
  }
  infoWindow.close();
}

// ── 지도 범위 조정 ──
function fitBounds(day) {
  const bounds = new google.maps.LatLngBounds();
  const pins = day === 'all' ? ALL_PINS : ALL_PINS.filter(p => p.dayNum === day);
  pins.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
  map.fitBounds(bounds, { top: 60, right: 20, bottom: 20, left: 20 });
}

// ── 패널 렌더링 ──
function renderList(day) {
  const list = document.getElementById('place-list');
  list.innerHTML = '';
  const days = day === 'all' ? DAYS_DATA : DAYS_DATA.filter(d => d.day === day);
  days.forEach(d => {
    const hdr = document.createElement('div');
    hdr.className = 'day-group-hdr';
    hdr.innerHTML = `<div class="day-dot" style="background:${d.color}"></div>${d.label}`;
    list.appendChild(hdr);
    d.pins.forEach((pin, idx) => {
      const item = document.createElement('div');
      item.className = 'place-item';
      item.dataset.id = pin.id;
      if (idx === d.pins.length - 1) item.dataset.last = 'true';
      const catBg = d.color + '1a';
      item.innerHTML = `
        <div class="pin-num" style="background:${d.color}"><span>${pin.id}</span></div>
        <div class="place-info">
          <div class="place-time">${pin.icon} ${pin.time}</div>
          <div class="place-name">${pin.name}</div>
          <span class="place-cat" style="background:${catBg};color:${d.color}">${pin.cat}</span>
          <div class="place-note">${pin.note}</div>
        </div>`;
      item.addEventListener('click', () => clickPlace(pin.id));
      list.appendChild(item);
    });
  });
}

// ── 모바일 토글 ──
function togglePanel() {
  const panel = document.getElementById('panel');
  const btn = document.getElementById('mob-toggle');
  panel.classList.toggle('hidden');
  btn.textContent = panel.classList.contains('hidden') ? '📋 일정 보기' : '🗺 지도 보기';
}
