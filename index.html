<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌺 오키나와 후발대 일정</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ── Design Tokens (이피알마케팅 design-kit) ── */
:root {
  --color-bg: #f6f8fb;
  --color-surface: #ffffff;
  --color-border: #dddddd;
  --color-border-light: #ececf2;
  --color-text-primary: #1f2021;
  --color-text-secondary: #525457;
  --color-text-muted: #757575;
  --color-accent: #5511bc;
  --color-accent-bg: #f2ecfc;
  --color-accent-light: #f6efff;
  --shadow-card: 2px 4px 18px rgba(28,32,36,0.06);
  --shadow-card-hover: 2px 4px 24px rgba(28,32,36,0.12);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --font: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --day1: #5511bc;
  --day2: #0077b6;
  --day3: #e65100;
  --day4: #2e7d32;
  --panel-w: 360px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--color-bg); color: var(--color-text-primary); overflow: hidden; }

/* ── 레이아웃 ── */
#app { display: flex; height: 100vh; }

/* ── 패널 ── */
#panel {
  width: var(--panel-w); min-width: var(--panel-w);
  height: 100%; display: flex; flex-direction: column;
  background: var(--color-surface);
  border-right: 1px solid var(--color-border-light);
  z-index: 100; box-shadow: var(--shadow-card);
}
#panel-header {
  background: linear-gradient(135deg, var(--color-accent) 0%, #7c3aed 100%);
  color: white; padding: 18px 20px 14px; flex-shrink: 0;
}
#panel-header h1 { font-size: 1rem; font-weight: 800; letter-spacing: -0.3px; }
#panel-header p { font-size: 0.72rem; opacity: 0.8; margin-top: 3px; }

/* DAY 탭 */
#day-tabs {
  display: flex; border-bottom: 1px solid var(--color-border-light);
  flex-shrink: 0; background: var(--color-surface);
}
.day-tab {
  flex: 1; padding: 10px 4px; text-align: center;
  font-size: 0.68rem; font-weight: 700; color: var(--color-text-muted);
  cursor: pointer; border-bottom: 3px solid transparent;
  transition: all 0.2s; line-height: 1.4; font-family: var(--font);
}
.day-tab:hover { background: var(--color-accent-light); color: var(--color-accent); }
.day-tab.active[data-day="all"] { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); background: var(--color-bg); }
.day-tab.active[data-day="1"] { color: var(--day1); border-bottom-color: var(--day1); background: var(--color-accent-light); }
.day-tab.active[data-day="2"] { color: var(--day2); border-bottom-color: var(--day2); background: #e8f4fd; }
.day-tab.active[data-day="3"] { color: var(--day3); border-bottom-color: var(--day3); background: #fff3e0; }
.day-tab.active[data-day="4"] { color: var(--day4); border-bottom-color: var(--day4); background: #e8f5e9; }

/* 장소 목록 */
#place-list { flex: 1; overflow-y: auto; padding: 8px 0; }
#place-list::-webkit-scrollbar { width: 4px; }
#place-list::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }

.day-group-header {
  padding: 8px 16px 5px; font-size: 0.65rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border-light);
  border-top: 1px solid var(--color-border-light);
  color: var(--color-text-muted);
  display: flex; align-items: center; gap: 6px;
}
.day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.place-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 16px; cursor: pointer;
  border-bottom: 1px solid var(--color-border-light);
  transition: background 0.15s; position: relative;
}
.place-item:hover { background: var(--color-accent-light); }
.place-item.active { background: var(--color-accent-bg); }
.place-item::before {
  content: ''; position: absolute;
  left: 27px; top: 34px; bottom: -10px;
  width: 2px; background: var(--color-border-light); z-index: 0;
}
.place-item[data-last="true"]::before { display: none; }

.place-num {
  width: 24px; height: 24px;
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; font-weight: 800; color: white;
  flex-shrink: 0; margin-top: 2px;
  position: relative; z-index: 1;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.place-num span { transform: rotate(45deg); display: block; }

.place-info { flex: 1; min-width: 0; }
.place-time { font-size: 0.63rem; color: var(--color-text-muted); font-weight: 600; margin-bottom: 1px; }
.place-name { font-size: 0.83rem; font-weight: 700; line-height: 1.35; color: var(--color-text-primary); }
.place-cat {
  font-size: 0.67rem; font-weight: 600; margin-top: 2px;
  padding: 1px 7px; border-radius: 9999px; display: inline-block;
}
.place-note { font-size: 0.67rem; color: var(--color-text-muted); margin-top: 3px; line-height: 1.4; }
.gmap-btn {
  display: inline-flex; align-items: center; gap: 3px;
  margin-top: 5px; font-size: 0.63rem; color: var(--color-accent);
  font-weight: 600; text-decoration: none;
  background: var(--color-accent-bg); border-radius: var(--radius-sm);
  padding: 3px 8px; transition: background 0.15s; font-family: var(--font);
}
.gmap-btn:hover { background: var(--color-accent-light); }

/* 범례 */
#legend {
  padding: 10px 16px; border-top: 1px solid var(--color-border-light);
  background: var(--color-bg); flex-shrink: 0;
}
.legend-row { display: flex; flex-wrap: wrap; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.63rem; color: var(--color-text-muted); }

/* ── 지도 영역 ── */
#map-area {
  flex: 1; height: 100%; position: relative; overflow: hidden;
  background: #eef0f5;
}
#map-iframe { width: 100%; height: 100%; border: none; display: block; }

/* 지도 플레이스홀더 */
#map-placeholder {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #f0eaff 0%, #e8f4fd 100%);
  gap: 20px; z-index: 5;
}
#map-placeholder .ph-icon { font-size: 4rem; }
#map-placeholder .ph-title { font-size: 1.1rem; font-weight: 800; color: var(--color-accent); }
#map-placeholder .ph-sub { font-size: 0.82rem; color: var(--color-text-muted); text-align: center; line-height: 1.7; }

/* DAY 경로 카드 */
#route-cards {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 16px; display: flex; gap: 10px; overflow-x: auto;
  background: linear-gradient(to top, rgba(240,234,255,0.95) 60%, transparent);
  z-index: 6;
}
#route-cards::-webkit-scrollbar { height: 4px; }
#route-cards::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
.route-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 14px 16px; min-width: 200px; flex-shrink: 0;
  cursor: pointer; transition: all 0.2s;
  text-decoration: none; color: inherit; display: block;
}
.route-card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-2px); }
.route-card-day { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.route-card-label { font-size: 0.88rem; font-weight: 700; color: var(--color-text-primary); margin-bottom: 8px; }
.route-card-stops { font-size: 0.7rem; color: var(--color-text-muted); line-height: 1.6; }
.route-card-btn {
  margin-top: 10px; display: inline-flex; align-items: center; gap: 4px;
  background: var(--color-accent); color: white;
  border-radius: var(--radius-sm); padding: 5px 12px;
  font-size: 0.7rem; font-weight: 700; font-family: var(--font);
}

/* 장소 팝업 */
#place-popup {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--color-surface);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card-hover);
  padding: 16px 20px; min-width: 300px; max-width: 420px;
  z-index: 20; display: none;
}
#place-popup.show { display: block; animation: popIn 0.2s ease; }
@keyframes popIn {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.popup-close {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; font-size: 1rem;
  cursor: pointer; color: var(--color-text-muted);
}
.popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.popup-num {
  width: 28px; height: 28px;
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 800; color: white; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.popup-num span { transform: rotate(45deg); display: block; }
.popup-title { font-size: 0.95rem; font-weight: 800; color: var(--color-text-primary); }
.popup-time { font-size: 0.7rem; color: var(--color-text-muted); font-weight: 600; margin-top: 1px; }
.popup-items { font-size: 0.78rem; color: var(--color-text-secondary); line-height: 1.7; }
.popup-items li { list-style: none; }
.popup-items li::before { content: "·  "; color: var(--color-accent); font-weight: 700; }
.popup-footer { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.popup-gmap {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--color-accent); color: white;
  border-radius: var(--radius-sm); padding: 7px 14px;
  font-size: 0.75rem; font-weight: 700; text-decoration: none;
  transition: opacity 0.2s; font-family: var(--font);
}
.popup-gmap:hover { opacity: 0.88; }
.popup-route {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--color-bg); color: var(--color-text-secondary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); padding: 7px 14px;
  font-size: 0.75rem; font-weight: 600; text-decoration: none;
  transition: all 0.2s; font-family: var(--font);
}
.popup-route:hover { background: var(--color-accent-light); color: var(--color-accent); border-color: var(--color-accent); }

/* 지도 컨트롤 */
#map-controls {
  position: absolute; top: 16px; right: 16px;
  display: flex; flex-direction: column; gap: 8px; z-index: 10;
}
.map-ctrl-btn {
  background: var(--color-surface);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-md);
  padding: 8px 14px; font-size: 0.75rem; font-weight: 700;
  color: var(--color-text-primary); cursor: pointer;
  box-shadow: var(--shadow-card); transition: all 0.2s;
  font-family: var(--font); white-space: nowrap;
}
.map-ctrl-btn:hover { background: var(--color-accent-light); color: var(--color-accent); }
.map-ctrl-btn.active { background: var(--color-accent); color: white; border-color: var(--color-accent); }

/* 모바일 */
#toggle-panel { display: none; }
@media (max-width: 680px) {
  :root { --panel-w: 100vw; }
  #panel { position: fixed; top: 0; left: 0; width: 100%; height: 55%; z-index: 200; transition: transform 0.3s; }
  #panel.hidden { transform: translateY(-100%); }
  #map-area { position: fixed; bottom: 0; left: 0; width: 100%; height: 50%; }
  #toggle-panel {
    display: flex; align-items: center; justify-content: center;
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 9999; background: var(--color-accent); color: white;
    border: none; border-radius: 24px; padding: 10px 24px;
    font-size: 0.82rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 16px rgba(85,17,188,0.35); font-family: var(--font);
  }
}
</style>
</head>
<body>
<div id="app">

  <!-- ── 왼쪽 패널 ── -->
  <div id="panel">
    <div id="panel-header">
      <h1>🌺 오키나와 후발대 일정</h1>
      <p>장소 클릭 → 구글맵 이동 &nbsp;|&nbsp; 4월 12~15일 · 4일</p>
    </div>
    <div id="day-tabs">
      <div class="day-tab active" data-day="all" onclick="filterDay('all',this)">전체</div>
      <div class="day-tab" data-day="1" onclick="filterDay(1,this)">DAY1<br>토</div>
      <div class="day-tab" data-day="2" onclick="filterDay(2,this)">DAY2<br>일</div>
      <div class="day-tab" data-day="3" onclick="filterDay(3,this)">DAY3<br>월</div>
      <div class="day-tab" data-day="4" onclick="filterDay(4,this)">DAY4<br>화</div>
    </div>
    <div id="place-list"></div>
    <div id="legend">
      <div class="legend-row">
        <div class="legend-item"><div class="day-dot" style="background:var(--day1)"></div>DAY1·토</div>
        <div class="legend-item"><div class="day-dot" style="background:var(--day2)"></div>DAY2·일</div>
        <div class="legend-item"><div class="day-dot" style="background:var(--day3)"></div>DAY3·월</div>
        <div class="legend-item"><div class="day-dot" style="background:var(--day4)"></div>DAY4·화</div>
      </div>
    </div>
  </div>

  <!-- ── 지도 영역 ── -->
  <div id="map-area">
    <!-- 구글맵 iframe -->
    <iframe id="map-iframe" allowfullscreen loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      src="about:blank">
    </iframe>

    <!-- 초기 플레이스홀더 -->
    <div id="map-placeholder">
      <div class="ph-icon">🗺️</div>
      <div class="ph-title">오키나와 후발대 동선</div>
      <div class="ph-sub">왼쪽 장소를 클릭하면 구글맵에서 확인할 수 있어요<br/>DAY 경로 버튼으로 전체 동선을 한눈에 보세요</div>
      <div id="route-cards-placeholder"></div>
    </div>

    <!-- 지도 컨트롤 -->
    <div id="map-controls">
      <button class="map-ctrl-btn active" id="btn-all" onclick="showMapAll()">🗺 전체 보기</button>
      <button class="map-ctrl-btn" id="btn-d1" onclick="openDayRoute(1)">DAY1 경로 열기</button>
      <button class="map-ctrl-btn" id="btn-d2" onclick="openDayRoute(2)">DAY2 경로 열기</button>
      <button class="map-ctrl-btn" id="btn-d3" onclick="openDayRoute(3)">DAY3 경로 열기</button>
      <button class="map-ctrl-btn" id="btn-d4" onclick="openDayRoute(4)">DAY4 경로 열기</button>
    </div>

    <!-- 장소 팝업 -->
    <div id="place-popup">
      <button class="popup-close" onclick="closePopup()">✕</button>
      <div class="popup-header">
        <div class="popup-num" id="popup-num"><span></span></div>
        <div>
          <div class="popup-title" id="popup-title"></div>
          <div class="popup-time" id="popup-time"></div>
        </div>
      </div>
      <ul class="popup-items" id="popup-items"></ul>
      <div class="popup-footer">
        <a class="popup-gmap" id="popup-gmap" href="#" target="_blank">📍 구글맵에서 보기</a>
        <a class="popup-route" id="popup-route" href="#" target="_blank">🚗 길찾기</a>
      </div>
    </div>

    <!-- DAY 경로 카드 (하단) -->
    <div id="route-cards"></div>
  </div>

</div>
<button id="toggle-panel" onclick="togglePanel()">📋 일정 보기</button>

<script>

// 장소 데이터
// ══════════════════════════════════════════

  {

// ── URL 생성 ──
function gmapUrl(pin) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(pin.q || pin.name)}`;
}
function gmapRouteUrl(pin) {
  return `https://www.google.com/maps/dir/?api=1&destination=${pin.lat},${pin.lng}`;
}
function gmapDayRouteUrl(day) {
  const d = DAYS.find(x => x.day === day);
  if (!d) return '#';
  const pins = d.pins;
  if (pins.length === 1) return gmapUrl(pins[0]);
  const parts = pins.map(p => `${p.lat},${p.lng}`);
  return `https://www.google.com/maps/dir/${parts.join('/')}`;
}
function gmapEmbedUrl(pin) {
  return `https://maps.google.com/maps?q=${encodeURIComponent(pin.q || pin.name)}&output=embed&hl=ko&z=15`;
}

// ── 패널 렌더링 ──
function renderList(day) {
  const list = document.getElementById('place-list');
  list.innerHTML = '';
  const days = day === 'all' ? DAYS : DAYS.filter(d => d.day === day);
  days.forEach(d => {
    const hdr = document.createElement('div');
    hdr.className = 'day-group-header';
    hdr.innerHTML = `<div class="day-dot" style="background:${d.color}"></div>${d.label}`;
    list.appendChild(hdr);
    d.pins.forEach((pin, idx) => {
      const item = document.createElement('div');
      item.className = 'place-item';
      item.dataset.id = pin.id;
      if (idx === d.pins.length - 1) item.dataset.last = 'true';
      const catBg = d.color + '18';
      item.innerHTML = `
        <div class="place-num" style="background:${d.color}"><span>${pin.id}</span></div>
        <div class="place-info">
          <div class="place-time">${pin.icon} ${pin.time}</div>
          <div class="place-name">${pin.name}</div>
          <span class="place-cat" style="background:${catBg};color:${d.color}">${pin.cat}</span>
          <div class="place-note">${pin.note}</div>
          <a class="gmap-btn" href="${gmapUrl(pin)}" target="_blank" onclick="event.stopPropagation()">📍 구글맵 열기</a>
        </div>`;
      item.addEventListener('click', () => selectPin(pin, d.color));
      list.appendChild(item);
    });
  });
}

// ── DAY 경로 카드 렌더링 ──
function renderRouteCards() {
  const container = document.getElementById('route-cards');
  container.innerHTML = '';
  DAYS.forEach(d => {
    const card = document.createElement('a');
    card.className = 'route-card';
    card.href = gmapDayRouteUrl(d.day);
    card.target = '_blank';
    const stops = d.pins.map((p,i) => `${i+1}. ${p.name}`).join('<br>');
    card.innerHTML = `
      <div class="route-card-day" style="color:${d.color}">${d.label}</div>
      <div class="route-card-label">📍 ${d.pins.length}개 장소</div>
      <div class="route-card-stops">${stops}</div>
      <div class="route-card-btn" style="background:${d.color}">🗺 경로 열기</div>`;
    container.appendChild(card);
  });
}

// ── 핀 선택 ──
function selectPin(pin, color) {
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.place-item[data-id="${pin.id}"]`);
  if (el) { el.classList.add('active'); el.scrollIntoView({block:'nearest', behavior:'smooth'}); }

  // 지도 iframe 업데이트
  const iframe = document.getElementById('map-iframe');
  const ph = document.getElementById('map-placeholder');
  iframe.src = gmapEmbedUrl(pin);
  if (ph) ph.style.display = 'none';

  // 팝업
  const popup = document.getElementById('place-popup');
  document.getElementById('popup-num').innerHTML = `<span style="transform:rotate(45deg);display:block">${pin.id}</span>`;
  document.getElementById('popup-num').style.background = color;
  document.getElementById('popup-title').textContent = pin.name;
  document.getElementById('popup-time').textContent = `${pin.icon}  ${pin.time}`;
  document.getElementById('popup-items').innerHTML = pin.items.map(i => `<li>${i}</li>`).join('');
  document.getElementById('popup-gmap').href = gmapUrl(pin);
  document.getElementById('popup-route').href = gmapRouteUrl(pin);
  popup.classList.add('show');
}

function closePopup() {
  document.getElementById('place-popup').classList.remove('show');
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('active'));
}

// ── DAY 탭 필터 ──
function filterDay(day, tabEl) {
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  renderList(day);
  closePopup();
  document.querySelectorAll('.map-ctrl-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-all').classList.add('active');
}

// ── 지도 컨트롤 ──
function setActiveMapBtn(id) {
  document.querySelectorAll('.map-ctrl-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('active');
}

function showMapAll() {
  setActiveMapBtn('btn-all');
  const iframe = document.getElementById('map-iframe');
  iframe.src = `https://maps.google.com/maps?q=오키나와&output=embed&hl=ko&z=9`;
  const ph = document.getElementById('map-placeholder');
  if (ph) ph.style.display = 'none';
}

function openDayRoute(day) {
  setActiveMapBtn(`btn-d${day}`);
  window.open(gmapDayRouteUrl(day), '_blank');
}

// ── 모바일 ──
function togglePanel() {
  const panel = document.getElementById('panel');
  const btn = document.getElementById('toggle-panel');
  panel.classList.toggle('hidden');
  btn.textContent = panel.classList.contains('hidden') ? '📋 일정 보기' : '🗺 지도 보기';
}

// ── 초기화 ──
renderList('all');
renderRouteCards();
</script>
